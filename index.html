<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Unblocker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        form {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 300px;
            padding: 10px;
            margin-right: 10px;
        }
        input[type="submit"] {
            padding: 10px 20px;
            background-color: #5cb85c;
            color: white;
            border: none;
            cursor: pointer;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Proxy Unblocker</h1>
    <form id="urlForm">
        <input type="text" id="urlInput" placeholder="Enter URL to unblock" required>
        <input type="submit" value="Unblock">
    </form>
    <iframe id="contentFrame" src="" frameborder="0"></iframe>

    <script>
        document.getElementById('urlForm').onsubmit = function(event) {
            event.preventDefault();
            var url = document.getElementById('urlInput').value;
            document.getElementById('contentFrame').src = url;
        };
    </script>
</body>
</html>
